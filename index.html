<script>
document.addEventListener("DOMContentLoaded", function () {
  const images = document.querySelectorAll(".portfolio-grid a");
  let currentIndex = 0;
  let overlay, img, prev, next;
  let touchStartX = 0;
  let touchEndX = 0;

  function openLightbox(index) {
    currentIndex = index;

    overlay = document.createElement("div");
    overlay.className = "lightbox";
    overlay.style.display = "flex";

    img = document.createElement("img");
    img.src = images[currentIndex].href;
    img.className = "lightbox-image-active";

    prev = document.createElement("div");
    prev.className = "lightbox-prev";
    prev.innerHTML = "&#10094;";

    next = document.createElement("div");
    next.className = "lightbox-next";
    next.innerHTML = "&#10095;";

    overlay.appendChild(prev);
    overlay.appendChild(img);
    overlay.appendChild(next);
    document.body.appendChild(overlay);

    // Sluiten alleen als je op de donkere achtergrond tikt
    overlay.addEventListener("click", function (e) {
      if (e.target === overlay) {
        closeLightbox();
      }
    });

    // Klik op afbeelding: links vorige, rechts volgende
    img.addEventListener("click", function (e) {
      e.stopPropagation();

      const rect = img.getBoundingClientRect();
      const clickX = e.clientX - rect.left;

      if (clickX < rect.width / 2) {
        showPrev();
      } else {
        showNext();
      }
    });

    prev.addEventListener("click", function (e) {
      e.stopPropagation();
      showPrev();
    });

    next.addEventListener("click", function (e) {
      e.stopPropagation();
      showNext();
    });

    document.addEventListener("keydown", keyHandler);

    // Swipe op de hele lightbox
    overlay.addEventListener("touchstart", function (e) {
      touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    overlay.addEventListener("touchend", function (e) {
      touchEndX = e.changedTouches[0].screenX;
      handleSwipe();
    }, { passive: true });
  }

  function closeLightbox() {
    document.removeEventListener("keydown", keyHandler);
    if (overlay) overlay.remove();
  }

  function changeImage(newIndex) {
    currentIndex = newIndex;

    img.classList.remove("lightbox-image-active");
    img.classList.add("lightbox-image-fade");

    setTimeout(() => {
      img.src = images[currentIndex].href;

      img.onload = function () {
        img.classList.remove("lightbox-image-fade");
        img.classList.add("lightbox-image-active");
      };
    }, 120);
  }

  function showNext() {
    let nextIndex = currentIndex + 1;
    if (nextIndex >= images.length) nextIndex = 0;
    changeImage(nextIndex);
  }

  function showPrev() {
    let prevIndex = currentIndex - 1;
    if (prevIndex < 0) prevIndex = images.length - 1;
    changeImage(prevIndex);
  }

  function keyHandler(e) {
    if (e.key === "ArrowRight") showNext();
    if (e.key === "ArrowLeft") showPrev();
    if (e.key === "Escape") closeLightbox();
  }

  function handleSwipe() {
    const diff = touchEndX - touchStartX;

    if (Math.abs(diff) < 50) return;

    if (diff < 0) {
      showNext();
    } else {
      showPrev();
    }
  }

  images.forEach((link, index) => {
    link.addEventListener("click", function (e) {
      e.preventDefault();
      openLightbox(index);
    });
  });
});
</script>
