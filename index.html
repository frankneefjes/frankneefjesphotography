 <script>
document.addEventListener("DOMContentLoaded", function () {

  const images = document.querySelectorAll(".portfolio-grid a");
  let currentIndex = 0;
  let overlay, img;

  function openLightbox(index){
    currentIndex = index;

    overlay = document.createElement("div");
    overlay.className = "lightbox";
    overlay.style.display = "flex";

    img = document.createElement("img");
    img.src = images[currentIndex].href;

    const prev = document.createElement("div");
    prev.className = "lightbox-prev";
    prev.innerHTML = "&#10094;";

    const next = document.createElement("div");
    next.className = "lightbox-next";
    next.innerHTML = "&#10095;";

    overlay.appendChild(prev);
    overlay.appendChild(img);
    overlay.appendChild(next);

    document.body.appendChild(overlay);

    overlay.addEventListener("click", closeLightbox);
    img.addEventListener("click", e => e.stopPropagation());

    prev.addEventListener("click", function(e){
      e.stopPropagation();
      showPrev();
    });

    next.addEventListener("click", function(e){
      e.stopPropagation();
      showNext();
    });

    document.addEventListener("keydown", keyHandler);
  }

  function closeLightbox(){
    document.removeEventListener("keydown", keyHandler);
    overlay.remove();
  }

  function showNext(){
    currentIndex++;
    if(currentIndex >= images.length) currentIndex = 0;
    img.src = images[currentIndex].href;
  }

  function showPrev(){
    currentIndex--;
    if(currentIndex < 0) currentIndex = images.length - 1;
    img.src = images[currentIndex].href;
  }

  function keyHandler(e){
    if(e.key === "ArrowRight") showNext();
    if(e.key === "ArrowLeft") showPrev();
    if(e.key === "Escape") closeLightbox();
  }

  images.forEach((link, index) => {
    link.addEventListener("click", function(e){
      e.preventDefault();
      openLightbox(index);
    });
  });

});
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const images = document.querySelectorAll(".portfolio-grid a");
  let currentIndex = 0;
  let overlay, img, prev, next;
  let touchStartX = 0;
  let touchEndX = 0;

  function openLightbox(index){
    currentIndex = index;

    overlay = document.createElement("div");
    overlay.className = "lightbox";
    overlay.style.display = "flex";

    img = document.createElement("img");
    img.src = images[currentIndex].href;
    img.className = "lightbox-image-active";

    prev = document.createElement("div");
    prev.className = "lightbox-prev";
    prev.innerHTML = "&#10094;";

    next = document.createElement("div");
    next.className = "lightbox-next";
    next.innerHTML = "&#10095;";

    overlay.appendChild(prev);
    overlay.appendChild(img);
    overlay.appendChild(next);
    document.body.appendChild(overlay);

    overlay.addEventListener("click", closeLightbox);

    img.addEventListener("click", function(e){
      e.stopPropagation();

      const rect = img.getBoundingClientRect();
      const clickX = e.clientX - rect.left;

      if (clickX < rect.width / 2) {
        showPrev();
      } else {
        showNext();
      }
    });

    prev.addEventListener("click", function(e){
      e.stopPropagation();
      showPrev();
    });

    next.addEventListener("click", function(e){
      e.stopPropagation();
      showNext();
    });

    document.addEventListener("keydown", keyHandler);

    overlay.addEventListener("touchstart", function(e){
      touchStartX = e.changedTouches[0].screenX;
    }, { passive:true });

    overlay.addEventListener("touchend", function(e){
      touchEndX = e.changedTouches[0].screenX;
      handleSwipe();
    }, { passive:true });
  }

  function closeLightbox(){
    document.removeEventListener("keydown", keyHandler);
    if (overlay) overlay.remove();
  }

  function changeImage(newIndex){
    currentIndex = newIndex;

    img.classList.remove("lightbox-image-active");
    img.classList.add("lightbox-image-fade");

    setTimeout(() => {
      img.src = images[currentIndex].href;

      img.onload = function(){
        img.classList.remove("lightbox-image-fade");
        img.classList.add("lightbox-image-active");
      };
    }, 120);
  }

  function showNext(){
    let nextIndex = currentIndex + 1;
    if(nextIndex >= images.length) nextIndex = 0;
    changeImage(nextIndex);
  }

  function showPrev(){
    let prevIndex = currentIndex - 1;
    if(prevIndex < 0) prevIndex = images.length - 1;
    changeImage(prevIndex);
  }

  function keyHandler(e){
    if(e.key === "ArrowRight") showNext();
    if(e.key === "ArrowLeft") showPrev();
    if(e.key === "Escape") closeLightbox();
  }

  function handleSwipe(){
    const diff = touchEndX - touchStartX;
    if (Math.abs(diff) < 40) return;

    if (diff < 0) {
      showNext();
    } else {
      showPrev();
    }
  }

  images.forEach((link, index) => {
    link.addEventListener("click", function(e){
      e.preventDefault();
      openLightbox(index);
    });
  });

});
</script>

    <script>
  document.addEventListener('DOMContentLoaded', function() {
    // Initialiseer PhotoSwipe
    const pswpElement = document.querySelectorAll('.pswp')[0];
    const items = [];

    // Maak een array van items voor PhotoSwipe
    document.querySelectorAll('.portfolio-grid a').forEach((link, index) => {
      const img = link.querySelector('img');
      items.push({
        src: link.getAttribute('href'),
        w: parseInt(link.getAttribute('data-size').split('x')[0]),
        h: parseInt(link.getAttribute('data-size').split('x')[1]),
        title: img.getAttribute('alt')
      });

      // Voeg een click event toe
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const options = {
          index: index,
          bgOpacity: 0.8,
          showHideOpacity: true
        };
        const lightBox = new PhotoSwipe(pswpElement, PhotoSwipeUI_Default, items, options);
        lightBox.init();
      });
    });
  });
</script>
