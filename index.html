 <script>
document.addEventListener("DOMContentLoaded", function () {

  const images = document.querySelectorAll(".portfolio-grid a");
  let currentIndex = 0;
  let overlay, img;

  function openLightbox(index){
    currentIndex = index;

    overlay = document.createElement("div");
    overlay.className = "lightbox";
    overlay.style.display = "flex";

    img = document.createElement("img");
    img.src = images[currentIndex].href;

    const prev = document.createElement("div");
    prev.className = "lightbox-prev";
    prev.innerHTML = "&#10094;";

    const next = document.createElement("div");
    next.className = "lightbox-next";
    next.innerHTML = "&#10095;";

    overlay.appendChild(prev);
    overlay.appendChild(img);
    overlay.appendChild(next);

    document.body.appendChild(overlay);

    overlay.addEventListener("click", closeLightbox);
    img.addEventListener("click", e => e.stopPropagation());

    prev.addEventListener("click", function(e){
      e.stopPropagation();
      showPrev();
    });

    next.addEventListener("click", function(e){
      e.stopPropagation();
      showNext();
    });

    document.addEventListener("keydown", keyHandler);
  }

  function closeLightbox(){
    document.removeEventListener("keydown", keyHandler);
    overlay.remove();
  }

  function showNext(){
    currentIndex++;
    if(currentIndex >= images.length) currentIndex = 0;
    img.src = images[currentIndex].href;
  }

  function showPrev(){
    currentIndex--;
    if(currentIndex < 0) currentIndex = images.length - 1;
    img.src = images[currentIndex].href;
  }

  function keyHandler(e){
    if(e.key === "ArrowRight") showNext();
    if(e.key === "ArrowLeft") showPrev();
    if(e.key === "Escape") closeLightbox();
  }

  images.forEach((link, index) => {
    link.addEventListener("click", function(e){
      e.preventDefault();
      openLightbox(index);
    });
  });

});
</script>

  // 1️⃣ Fade-in script
  const faders = document.querySelectorAll('.fade-in');

  const appearOptions = {
    threshold: 0.2
  };

  const appearOnScroll = new IntersectionObserver(function(entries, observer) {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      entry.target.classList.add('visible');
      observer.unobserve(entry.target);
    });
  }, appearOptions);

  faders.forEach(fader => {
    appearOnScroll.observe(fader);
  });
  });

<script>
document.addEventListener("DOMContentLoaded", function () {

  const images = document.querySelectorAll(".portfolio-grid a");
  let currentIndex = 0;
  let overlay, img, prev, next;
  let touchStartX = 0;
  let touchEndX = 0;
function handleSwipe(){
  const swipeDistance = touchEndX - touchStartX;

  if (Math.abs(swipeDistance) < 50) return;

  if (swipeDistance < 0) {
    nextImage();
  } else {
    prevImage();
  }
}
  function openLightbox(index){
    currentIndex = index;

    overlay = document.createElement("div");
    overlay.className = "lightbox";
    overlay.style.display = "flex";
    overlay.addEventListener("touchstart", function(e){
  touchStartX = e.changedTouches[0].screenX;
}, {passive:true});

overlay.addEventListener("touchend", function(e){
  touchEndX = e.changedTouches[0].screenX;
  handleSwipe();
}, {passive:true});

    img = document.createElement("img");
    img.src = images[currentIndex].href;
    img.className = "lightbox-image-active";

    prev = document.createElement("div");
    prev.className = "lightbox-prev";
    prev.innerHTML = "&#10094;";

    next = document.createElement("div");
    next.className = "lightbox-next";
    next.innerHTML = "&#10095;";

    overlay.appendChild(prev);
    overlay.appendChild(img);
    overlay.appendChild(next);
    document.body.appendChild(overlay);

    overlay.addEventListener("click", closeLightbox);

    img.addEventListener("click", function(e){
      e.stopPropagation();

      const rect = img.getBoundingClientRect();
      const clickX = e.clientX - rect.left;

      if (clickX < rect.width / 2) {
        showPrev();
      } else {
        showNext();
      }
    });

    prev.addEventListener("click", function(e){
      e.stopPropagation();
      showPrev();
    });

    next.addEventListener("click", function(e){
      e.stopPropagation();
      showNext();
    });

    document.addEventListener("keydown", keyHandler);

    overlay.addEventListener("touchstart", function(e){
      touchStartX = e.changedTouches[0].screenX;
    }, { passive:true });

    overlay.addEventListener("touchend", function(e){
      touchEndX = e.changedTouches[0].screenX;
      handleSwipe();
    }, { passive:true });
  }

  function closeLightbox(){
    document.removeEventListener("keydown", keyHandler);
    if (overlay) overlay.remove();
  }

  function changeImage(newIndex){
    currentIndex = newIndex;

    img.classList.remove("lightbox-image-active");
    img.classList.add("lightbox-image-fade");

    setTimeout(() => {
      img.src = images[currentIndex].href;

      img.onload = function(){
        img.classList.remove("lightbox-image-fade");
        img.classList.add("lightbox-image-active");
      };
    }, 120);
  }

  function showNext(){
    let nextIndex = currentIndex + 1;
    if(nextIndex >= images.length) nextIndex = 0;
    changeImage(nextIndex);
  }

  function showPrev(){
    let prevIndex = currentIndex - 1;
    if(prevIndex < 0) prevIndex = images.length - 1;
    changeImage(prevIndex);
  }

  function keyHandler(e){
    if(e.key === "ArrowRight") showNext();
    if(e.key === "ArrowLeft") showPrev();
    if(e.key === "Escape") closeLightbox();
  }

  function handleSwipe(){
    const diff = touchEndX - touchStartX;
    if (Math.abs(diff) < 40) return;

    if (diff < 0) {
      showNext();
    } else {
      showPrev();
    }
  }

  images.forEach((link, index) => {
    link.addEventListener("click", function(e){
      e.preventDefault();
      openLightbox(index);
    });
  });

});
</script>
